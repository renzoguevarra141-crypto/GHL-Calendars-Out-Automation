name: Keep Alive

# GitHub disables scheduled workflows on repos with no recent activity.
# This workflow runs weekly to keep the repo active so cron triggers work.

on:
  schedule:
    - cron: '0 12 * * 3'  # Wednesday noon UTC (keeps repo active before Thursday run)

permissions:
  contents: write

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Keep alive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: keep-alive [skip ci]"
          git push
