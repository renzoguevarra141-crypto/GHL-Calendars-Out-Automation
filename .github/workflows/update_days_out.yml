name: Update GHL Calendar Days Out

on:
  schedule:
    # Thursday 11:55pm CT (CDT=UTC-5) = Friday 04:55 UTC
    - cron: '55 4 * * 5'
    # Friday 11:55pm CT (CDT=UTC-5) = Saturday 04:55 UTC
    - cron: '55 4 * * 6'
    # Saturday 11:55pm CT (CDT=UTC-5) = Sunday 04:55 UTC
    - cron: '55 4 * * 0'
    # Sunday 11:55pm CT (CDT=UTC-5) = Monday 04:55 UTC
    - cron: '55 4 * * 1'
  workflow_dispatch: # Manual trigger for testing

permissions:
  contents: read

jobs:
  update-days-out:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine days-out value from CT day-of-week
        id: config
        run: |
          DOW=$(TZ=America/Chicago date +%u)  # 1=Mon, 4=Thu, 5=Fri, 6=Sat, 7=Sun
          echo "CT day-of-week: $DOW"
          if [[ "$DOW" == "4" ]]; then
            echo "days_out=4" >> "$GITHUB_OUTPUT"
          elif [[ "$DOW" == "5" ]]; then
            echo "days_out=3" >> "$GITHUB_OUTPUT"
          elif [[ "$DOW" == "6" ]]; then
            echo "days_out=3" >> "$GITHUB_OUTPUT"
          elif [[ "$DOW" == "7" ]]; then
            echo "days_out=2" >> "$GITHUB_OUTPUT"
          else
            echo "days_out=0" >> "$GITHUB_OUTPUT"
            echo "::warning::Unexpected day-of-week ($DOW). Skipping update."
          fi

      - name: Update calendars
        if: steps.config.outputs.days_out != '0'
        env:
          GHL_API_KEY: ${{ secrets.GHL_API_KEY }}
          GHL_LOCATION_ID: ${{ secrets.GHL_LOCATION_ID }}
        working-directory: tools
        run: python ghl_run_scheduled_update.py --days-out ${{ steps.config.outputs.days_out }}
